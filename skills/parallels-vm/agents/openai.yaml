interface:
  display_name: "Parallels VM"
  short_description: "Control Parallels VMs with prlctl plus macOS and Linux guest wrappers for OpenClaw website installs, release smoke runs, update verification, and gateway probing."
  default_prompt: "Use $parallels-vm to automate or inspect Parallels Desktop VMs on Peter's Mac. Prefer prlctl first, choose `prl-macos-*` for macOS guests and `prl-linux-*` for Linux guests, use the bundled wrappers for OpenClaw release smoke from openclaw.ai and gateway verification, fall back to detached manual gateway probes when service/bootstrap paths are broken, use guest-native control second, and Peekaboo only when host-side GUI automation is required."
